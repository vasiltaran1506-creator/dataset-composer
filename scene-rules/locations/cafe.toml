[meta]
id = "cafe"
display_name = "Cafe"
type = "indoor_public"

[hard_constraints]
allowed_actions = [
    "reading",
    "eating",
    "drinking",
    "studying",
    "writing",
]
excluded_actions = [
    "sleeping",
    "cooking",
    "bathing",
    "swimming",
    "exercising",
    "shopping",
    "dancing",
]
excludes_outfit_categories = [
    "full_body",
    "swimsuit",
    "underwear",
]
allowed_outfit_categories = [
    "bottomwear",
    "footwear",
    "legwear",
    "topwear",
]
excludes_weather = [
    "clear_sky",
    "cloudy",
    "fog",
    "overcast",
    "rain",
    "snow",
    "storm",
    "sunny",
]
excludes_lighting_sources = [
    "bright sunlight",
    "moonlight",
    "sunlight",
]
excludes_props = [
    "bed",
    "blanket",
    "bunk bed",
    "canopy bed",
    "double bed",
    "frying_pan",
    "knife",
    "pillow",
    "single bed",
    "surfboard",
]

[soft_constraints]
prefers_actions = [
    "drinking",
]
prefers_props = [
    "coffee cup",
    "teacup",
    "mug",
    "glass",
    "wine glass",
    "beer mug",
    "soda can",
    "water bottle",
    "bento",
    "sandwich",
    "coffee cup",
    "teacup",
    "laptop",
    "book",
]
