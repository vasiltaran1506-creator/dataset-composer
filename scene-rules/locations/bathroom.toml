[meta]
id = "bathroom"
category = "location"
display_name = "Bathroom"
type = "indoor_private"

[hard_constraints]
allowed_outfit_categories = [
    "02_clothing/underwear/",
    "02_clothing/full_body/swimsuits.txt"
]

excludes_outfit_categories = [
    "02_clothing/topwear/",
    "02_clothing/bottomwear/",
    "02_clothing/full_body/dresses.txt",
    "02_clothing/full_body/uniforms.txt",
    "02_clothing/footwear/"
]

excludes_actions = [
    "looking_out_window", "cooking", "sleeping", "reading", 
    "studying", "exercising", "eating", "drinking_tea", 
    "playing_instrument", "walking", "running"
]

excludes_props = [
    "book", "laptop", "smartphone", "tablet",
    "coffee_cup", "teacup", "food", "bento",
    "steering_wheel", "bicycle", "shopping_bag",
    "blackboard", "school_desk", "torii_gate"
]

[soft_constraints]
prefers_actions = [
    "brushing_teeth", "washing_face", "washing_hands", "taking_bath",
    "taking_shower", "drying_hair", "brushing_hair", "looking_in_mirror", "doing_skincare"
]

prefers_lighting_sources = ["mirror_light", "overhead_light", "window_light", "candlelight", "warm_lamp"]
prefers_lighting_quality = ["bright_lighting", "soft_lighting", "clean_lighting"]

prefers_furniture = ["bathtub", "shower", "sink", "mirror", "toilet", "towel_rack", "bath_mat"]
prefers_props = ["towel", "bath_towel", "soap", "shampoo", "toothbrush", "toothpaste", "hairbrush", "hair_dryer", "bath_bomb", "rubber_duck", "loofah", "skincare_bottle"]

[weather_rules.if_weather_is_rain]
prefers_actions = ["taking_bath", "taking_shower", "doing_skincare"]
prefers_effects = ["steam", "fog_on_mirror"]

[visibility_modifiers]
conceals_if_taking_bath = ["lower_body", "feet_footwear", "upper_body"] 
conceals_if_taking_shower = ["feet_footwear"]
reveals_features_if_looking_in_mirror = ["face", "hands", "upper_body"]