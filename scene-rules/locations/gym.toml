[meta]
id = "gym"
display_name = "Gym"
type = "outdoor_urban"

[hard_constraints]
allowed_actions = [
    "exercising",
]
excluded_actions = [
    "sleeping",
    "cooking",
    "bathing",
    "reading",
    "studying",
    "shopping",
    "dancing",
    "eating",
    "drinking",
]
allowed_outfit_categories = [
    "bottomwear",
    "footwear",
    "legwear",
    "topwear",
]
excludes_outfit_categories = [
    "footwear/boots",
    "full_body",
    "swimsuit",
    "underwear",
]
excludes_weather = [
    "clear_sky",
    "cloudy",
    "fog",
    "overcast",
    "rain",
    "snow",
    "storm",
    "sunny",
]
excludes_lighting_sources = [
    "candlelight",
    "firelight",
    "moonlight",
]
excludes_props = [
    "bed",
    "blanket",
    "book",
    "frying_pan",
    "knife",
    "laptop",
    "pillow",
]

[soft_constraints]
prefers_actions = [
    "drinking",
    "exercising",
]
prefers_props = [
    "water_bottle",
    "towel",
]
