[meta]
id = "school_classroom"
display_name = "School Classroom"
type = "indoor_institutional"

[hard_constraints]
allowed_outfit_categories = [
    "02_clothing/full_body/uniforms.txt", "02_clothing/topwear/shirts.txt", "02_clothing/topwear/sweaters.txt",
    "02_clothing/bottomwear/skirts.txt", "02_clothing/bottomwear/pants.txt", "02_clothing/legwear/"
]

[soft_constraints]
prefers_actions = ["studying", "reading", "writing", "taking_notes", "looking_at_blackboard", "thinking", "daydreaming"]
prefers_lighting_sources = ["fluorescent_light", "window_light", "overhead_light"]
prefers_lighting_quality = ["bright_lighting", "natural_lighting", "institutional_lighting"]
prefers_props = ["textbook", "notebook", "pen", "pencil", "eraser", "ruler", "school_bag", "chalk"]