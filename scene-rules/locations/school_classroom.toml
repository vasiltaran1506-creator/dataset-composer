[meta]
id = "school_classroom"
category = "location"
display_name = "School Classroom"
type = "indoor_institutional"

[hard_constraints]
# ✅ Разрешенные стили (Character Profile)
allowed_outfit_styles = ["casual_shirt_skirt", "sportswear"]

# ✅ Разрешенные стили одежды для Луны

# ✅ WHITELIST для одежды (в школе уместна форма или опрятная одежда)

# 🛑 BLACKLIST: Что неуместно в школе
excludes_outfit_categories = [
    "02_clothing/underwear/",
    "02_clothing/full_body/pajamas.txt",
    "02_clothing/full_body/swimsuits.txt",
    "02_clothing/full_body/loungewear.txt",
    "02_clothing/topwear/coats.txt",
    "02_clothing/topwear/jackets.txt"
]

# ✅ WHITELIST для действий (учебные действия)
allowed_actions = [
    "studying",
    "reading",
    "writing",
    "taking_notes",
    "listening_to_teacher",
    "looking_at_blackboard",
    "raising_hand",
    "thinking",
    "daydreaming",
    "chatting_with_classmate"
]

# 🛑 Запрещенные действия
excludes_actions = [
    "sleeping",
    "running",
    "eating",        # В классе обычно не едят
    "drinking",      # Кроме воды из бутылки
    "dancing",
    "singing"
]

[soft_constraints]
# ⚖️ Предпочитаемая одежда
[soft_constraints.prefers_outfit_categories_weights]
"02_clothing/full_body/uniforms.txt" = 0.5
"02_clothing/topwear/shirts.txt" = 0.25
"02_clothing/topwear/sweaters.txt" = 0.25

# 💡 Освещение: школьное, флуоресцентное + окно
prefers_lighting_sources = [
    "fluorescent_light", "window_light", "overhead_light"
]
prefers_lighting_quality = [
    "bright_lighting", "natural_lighting", "institutional_lighting"
]

# 📚 Школьная мебель и реквизит
prefers_furniture = [
    "school_desk", "wooden_chair", "blackboard", 
    "bookshelf", "globe", "clock", "window"
]
prefers_props = [
    "textbook", "notebook", "pen", "pencil", 
    "eraser", "ruler", "school_bag", "lunch_box",
    "chalk", "calculator"
]

[visibility_modifiers]
# В классе обычно видны лицо, руки (пишут), верхняя часть тела
reveals_features = ["face", "upper_body", "hands"]
# Если сидит за партой — ноги скрыты
conceals_if_sitting_at_desk = ["lower_body", "feet_footwear"]

[time_of_day]
prefers = ["morning", "afternoon"]
avoids = ["evening", "night"]  # Школа работает днем