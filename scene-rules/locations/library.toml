[meta]
id = "library"
category = "location"
display_name = "Library"
type = "indoor_public"  # Публичное тихое помещение

[hard_constraints]
# ✅ WHITELIST: Уместная одежда для библиотеки
allowed_outfit_categories = [
    "02_clothing/topwear/shirts.txt",
    "02_clothing/topwear/blouses.txt",
    "02_clothing/topwear/sweaters.txt",
    "02_clothing/topwear/jackets.txt",
    "02_clothing/bottomwear/pants.txt",
    "02_clothing/bottomwear/skirts.txt",
    "02_clothing/full_body/dresses.txt",
    "02_clothing/full_body/uniforms.txt",    # Школьная форма — ок
    "02_clothing/legwear/",
    "02_clothing/footwear/shoes.txt",
    "02_clothing/accessories/"
]

# 🛑 BLACKLIST: Неуместно в публичной библиотеке
excludes_outfit_categories = [
    "02_clothing/underwear/",                 # Нижнее белье
    "02_clothing/full_body/pajamas.txt",      # Пижама
    "02_clothing/full_body/swimsuits.txt",    # Купальник
    "02_clothing/full_body/loungewear.txt"    # Домашняя одежда
]

# 🛑 Запрещенные действия (в библиотеке нужна тишина)
excludes_actions = [
    "shouting", "singing", "running", 
    "dancing", "fighting", "sleeping"
]

[soft_constraints]
# ⚖️ Типичные действия для библиотеки
prefers_actions = [
    "reading",
    "studying",
    "writing",
    "looking_for_book",
    "browsing_bookshelf",
    "taking_notes",
    "thinking"
]

# 💡 Освещение: теплое, книжное, атмосферное
prefers_lighting_sources = [
    "lamplight", "desk_lamp", "window_light", 
    "fluorescent_light", "warm_lamp"
]
prefers_lighting_quality = [
    "soft_lighting", "warm_lighting", 
    "cinematic_lighting", "chiaroscuro"
]

# 📚 Реквизит библиотеки
prefers_furniture = [
    "bookshelf", "desk", "chair", "reading_table", 
    "armchair", "ladder", "globe"
]
prefers_props = [
    "book", "notebook", "pen", "reading_glasses", 
    "laptop", "stack_of_books", "bookmark"
]

[visibility_modifiers]
# Часто видны руки (держат книгу) и верхняя часть тела
reveals_features = ["hands", "upper_body", "face"]