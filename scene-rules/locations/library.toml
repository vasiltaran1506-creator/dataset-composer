[meta]
id = "library"
display_name = "Library"
type = "indoor_public"

[hard_constraints]
allowed_actions = [
    "reading",
    "studying",
    "writing",
]
excluded_actions = [
    "sleeping",
    "cooking",
    "bathing",
    "swimming",
    "exercising",
    "eating",
    "drinking",
    "shopping",
    "dancing",
]
excludes_outfit_categories = [
    "full_body",
    "swimsuit",
    "underwear",
]
allowed_outfit_categories = [
    "bottomwear",
    "footwear",
    "legwear",
    "topwear",
]
excludes_weather = [
    "clear_sky",
    "fog",
    "rain",
    "snow",
    "storm",
    "sunny",
]
excludes_lighting_sources = [
    "bright sunlight",
    "neon light",
    "sunlight",
]
excludes_props = [
    "bathtub",
    "beach_ball",
    "bed",
    "bunk bed",
    "canopy bed",
    "double bed",
    "frying_pan",
    "knife",
    "shower",
    "single bed",
    "surfboard",
]

[soft_constraints]
prefers_actions = [
    "reading",
    "studying",
    "writing",
]
prefers_props = [
    "book",
    "novel",
    "manga",
    "magazine",
    "newspaper",
    "textbook",
    "notebook",
    "journal",
    "diary",
    "comic_book",
    "art_book",
    "cookbook",
    "encyclopedia",
    "dictionary",
    "paperback",
    "bed",
    "single bed",
    "double bed",
    "bunk bed",
    "canopy bed",
    "mattress",
    "pillow",
    "blanket",
    "pen",
    "pencil",
    "mechanical_pencil",
    "fountain_pen",
    "ballpoint_pen",
]
