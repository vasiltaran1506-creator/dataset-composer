[meta]
id = "balcony"
category = "location"
display_name = "Balcony"
type = "outdoor_semi_private"

[hard_constraints]
excludes_outfit_categories = [
    "02_clothing/full_body/swimsuits.txt",
    "02_clothing/underwear/",
    "02_clothing/full_body/uniforms.txt",
    "02_clothing/footwear/boots.txt"
]

excludes_actions = [
    "cooking", "sleeping", "exercising", "swimming", 
    "taking_bath", "playing_instrument", "studying"
]

excludes_props = [
    "steering_wheel", "dashboard",
    "frying_pan", "stove", "refrigerator", "knife",
    "bathtub", "shower", "toilet",
    "blackboard", "school_desk", "torii_gate",
    "beach_ball", "surfboard"
]

[soft_constraints]
prefers_actions = ["drinking_coffee", "drinking_tea", "looking_out_window", "reading", "watering_plants", "leaning_on_railing", "daydreaming", "taking_photos"]

prefers_lighting_sources = ["sunlight", "sunset", "sunrise", "moonlight", "city_lights", "streetlight", "golden_hour"]
prefers_lighting_quality = ["natural_lighting", "golden_hour", "blue_hour", "cinematic_lighting", "moody_lighting"]

prefers_furniture = ["balcony_chair", "small_table", "hammock", "railing", "potted_plant"]
prefers_props = ["coffee_cup", "teacup", "mug", "book", "smartphone", "camera", "watering_can", "blanket"]

[weather_rules.if_weather_is_rain]
prefers_actions = ["looking_at_rain", "daydreaming", "looking_out_window"]
prefers_props = ["blanket", "hot_drink", "umbrella"]
prefers_lighting_quality = ["moody_lighting", "soft_lighting"]

[weather_rules.if_weather_is_snow]
requires_outfit_categories = ["02_clothing/topwear/sweaters.txt", "02_clothing/topwear/jackets.txt"]
prefers_props = ["blanket", "hot_drink", "scarf"]
prefers_lighting_quality = ["soft_lighting", "cold_lighting"]

[weather_rules.if_weather_is_night]
prefers_actions = ["looking_out_window", "daydreaming", "looking_at_stars"]
prefers_lighting_sources = ["moonlight", "city_lights", "streetlight"]
prefers_lighting_quality = ["low-key_lighting", "cinematic_lighting"]

[weather_rules.if_weather_is_sunny]
prefers_actions = ["drinking_coffee", "reading", "watering_plants"]
prefers_props = ["sunglasses", "sun_hat"]

[visibility_modifiers]
conceals_if_leaning_on_railing = ["lower_body", "feet_footwear"]
reveals_features = ["face", "upper_body", "hands"]