[meta]
id = "train_interior"
category = "location"
display_name = "Train Interior"
type = "indoor_public"

[hard_constraints]
excludes_outfit_categories = [
    "02_clothing/underwear/",
    "02_clothing/full_body/pajamas.txt",
    "02_clothing/full_body/swimsuits.txt",
    "02_clothing/full_body/loungewear.txt"
]

excludes_actions = [
    "cooking", "bathing", "exercising", "swimming", 
    "taking_bath", "playing_instrument", "shouting", "running"
]

[soft_constraints]
prefers_actions = ["sitting_by_window", "looking_out_window", "reading", "listening_to_music", "using_smartphone", "sleeping", "daydreaming", "holding_strap", "standing"]

prefers_lighting_sources = ["window_light", "sunset", "golden_hour", "overhead_light", "scenic_light"]
prefers_lighting_quality = ["cinematic_lighting", "warm_lighting", "dramatic_lighting", "moving_light"]

prefers_furniture = ["train_seat", "window", "hand_strap", "luggage_rack"]
prefers_props = ["bag", "backpack", "headphones", "smartphone", "book", "ticket", "bento"]

prefers_scenic_elements = ["scenic_view", "cityscape", "countryside", "sunset_view", "night_city_lights", "mountains_in_distance"]

[time_of_day]
prefers = ["morning", "afternoon", "evening", "sunset"]

[visibility_modifiers]
reveals_features = ["face", "upper_body", "hair"]
conceals_if_sitting_by_window = ["lower_body", "feet_footwear"]