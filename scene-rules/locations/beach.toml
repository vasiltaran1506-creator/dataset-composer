[meta]
id = "beach"
category = "location"
display_name = "Beach"
type = "outdoor"

[hard_constraints]
excludes_outfit_categories = [
    "02_clothing/topwear/coats.txt",
    "02_clothing/topwear/jackets.txt",
    "02_clothing/topwear/sweaters.txt",
    "02_clothing/bottomwear/pants.txt",
    "02_clothing/full_body/uniforms.txt",
    "02_clothing/footwear/boots.txt",
    "02_clothing/legwear/pantyhose.txt",
    "02_clothing/legwear/thighhighs.txt"
]

excludes_weather = ["snow", "blizzard", "heavy_rain", "fog", "hail", "thunderstorm"]

excludes_actions = [
    "cooking", "studying", "sleeping", "taking_bath", 
    "playing_instrument", "exercising", "writing"
]

excludes_props = [
    "steering_wheel", "dashboard", "frying_pan", "stove",
    "bathtub", "shower", "blackboard", "school_desk",
    "laptop", "desktop_computer", "torii_gate"
]

[soft_constraints]
prefers_actions = ["walking_along_shore", "swimming", "sunbathing", "collecting_shells", "building_sandcastle", "sitting_on_towel", "looking_at_sea", "playing_in_water", "taking_photos"]

prefers_lighting_sources = ["sunlight", "bright_sunlight", "golden_hour", "sunset", "sunrise"]
prefers_lighting_quality = ["natural_lighting", "hard_lighting", "golden_hour", "warm_lighting"]

prefers_props = ["beach_towel", "beach_umbrella", "beach_ball", "sunglasses", "sunscreen", "sandals", "flip_flops", "surfboard", "bucket", "shell"]
prefers_nature = ["sand", "ocean_waves", "palm_tree", "driftwood", "shell", "seagull"]

[weather_rules.if_weather_is_sunny]
prefers_actions = ["sunbathing", "swimming", "walking_along_shore"]
prefers_props = ["sunglasses", "sunscreen", "beach_umbrella"]

[weather_rules.if_weather_is_rain]
prefers_actions = ["looking_at_sea", "walking_along_shore"]
prefers_lighting_quality = ["soft_lighting", "overcast_lighting"]

[visibility_modifiers]
reveals_features = ["face", "upper_body", "lower_body", "feet_footwear", "back_view"]
conceals_if_swimming = ["feet_footwear", "lower_body"]