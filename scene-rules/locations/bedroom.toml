[meta]
id = "bedroom"
display_name = "Bedroom"
type = "indoor_private"

[hard_constraints]
allowed_actions = [
    "sleeping",
    "reading",
    "studying",
    "eating",
    "drinking",
    "writing",
    "dancing",
]
excluded_actions = [
    "cooking",
    "bathing",
    "swimming",
    "exercising",
    "shopping",
]
allowed_outfit_categories = [
    "bottomwear",
    "footwear",
    "full_body",
    "legwear",
    "topwear",
    "underwear",
]
excludes_weather = [
    "clear sky",
    "clear_sky",
    "cloudy",
    "fog",
    "overcast",
    "rain",
    "snow",
    "storm",
    "sunny",
]
excludes_outfit_categories = [
    "swimsuit",
]
excludes_lighting_sources = [
    "bright sunlight",
    "moonlight",
    "starlight",
    "sunlight",
]
excludes_props = [
    "beach_ball",
    "cooking pot",
    "frying_pan",
    "knife",
    "surfboard",
]

[soft_constraints]
prefers_actions = [
    "sleeping",
    "reading",
    "studying",
    "eating",
]
prefers_props = [
    "bed",
    "single bed",
    "double bed",
    "bunk bed",
    "canopy bed",
    "mattress",
    "pillow",
    "blanket",
    "duvet",
    "sheet",
    "smartphone",
    "cellphone",
    "mobile phone",
    "book",
    "smartphone",
    "pillow",
    "blanket",
]
