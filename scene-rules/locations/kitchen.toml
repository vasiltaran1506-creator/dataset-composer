[meta]
id = "kitchen"
category = "location"
display_name = "Kitchen"
type = "indoor_private"

[hard_constraints]
# ✅ Разрешенные стили одежды для Луны
allowed_outfit_styles = ["pajamas", "loungewear", "casual_shirt_skirt"]

# ✅ WHITELIST: В кухне уместна домашняя или повседневная одежда

# 🛑 BLACKLIST: Неуместно на кухне
excludes_outfit_categories = [
    "02_clothing/full_body/swimsuits.txt",
    "02_clothing/topwear/coats.txt",
    "02_clothing/topwear/jackets.txt",
    "02_clothing/full_body/uniforms.txt", # Если это не кулинарная форма
    "02_clothing/footwear/boots.txt"
]

# ✅ WHITELIST действий (на кухне готовят и едят)
allowed_actions = [
    "cooking",
    "baking",
    "eating",
    "drinking_tea",
    "drinking_coffee",
    "washing_dishes",
    "making_sandwich",
    "chopping_vegetables",
    "stirring_pot",
    "leaning_on_counter"
]

# 🛑 Запрещенные действия
excludes_actions = [
    "sleeping",
    "studying", # Учиться на кухне неудобно
    "exercising",
    "bathing"
]

[soft_constraints]
# 💡 Освещение: функциональное, но может быть уютным утренним
prefers_lighting_sources = [
    "overhead_light", "window_light", "sunlight", 
    "warm_lamp", "fluorescent_light"
]
prefers_lighting_quality = [
    "bright_lighting", "natural_lighting", "warm_lighting"
]

# 🍳 Реквизит и мебель
prefers_furniture = [
    "kitchen_counter", "dining_table", "wooden_chair", 
    "stool", "refrigerator", "stove", "sink", "cupboard"
]
prefers_props = [
    "coffee_cup", "teacup", "mug", "plate", "bowl", 
    "fork", "spoon", "knife", "chopsticks", "frying_pan", 
    "pot", "kettle", "toaster", "fruit", "bread", 
    "cutting_board", "apron"
]

[visibility_modifiers]
# Если сидит за столом - ноги скрыты
conceals_if_sitting_at_table = ["lower_body", "feet_footwear"]
# Если стоит у плиты/столешницы - видны руки и верх
reveals_features = ["face", "upper_body", "hands"]