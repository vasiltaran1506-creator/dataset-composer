[meta]
id = "kitchen"
display_name = "Kitchen"
type = "indoor_private"

[hard_constraints]
allowed_outfit_categories = [
    "02_clothing/full_body/pajamas.txt",
    "02_clothing/full_body/loungewear.txt",
    "02_clothing/topwear/shirts.txt",
    "02_clothing/bottomwear/shorts.txt",
    "02_clothing/bottomwear/pants.txt",
]

[soft_constraints]
prefers_actions = [
    "cooking",
    "eating",
    "drinking_tea",
]
prefers_lighting_sources = [
    "overhead_light",
    "window_light",
    "fluorescent_light",
]
prefers_lighting_quality = [
    "bright_lighting",
    "natural_lighting",
    "warm_lighting",
]
prefers_props = [
    "coffee_cup",
    "teacup",
    "plate",
    "frying_pan",
    "pot",
    "kettle",
    "fruit",
    "bread",
    "apron",
]
