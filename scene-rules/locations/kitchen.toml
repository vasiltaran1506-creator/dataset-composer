[meta]
id = "kitchen"
display_name = "Kitchen"
type = "indoor_private"

[hard_constraints]
allowed_actions = [
    "cooking",
    "eating",
    "drinking",
]
excluded_actions = [
    "sleeping",
    "bathing",
    "swimming",
    "exercising",
    "studying",
    "reading",
    "shopping",
    "dancing",
]
allowed_outfit_categories = [
    "bottomwear",
    "footwear",
    "legwear",
    "topwear",
]
excludes_outfit_categories = [
    "full_body",
    "swimsuit",
]
excludes_weather = [
    "clear_sky",
    "cloudy",
    "fog",
    "overcast",
    "rain",
    "snow",
    "storm",
    "sunny",
]
excludes_lighting_sources = [
    "candlelight",
    "moonlight",
    "sunlight",
]
excludes_props = [
    "bathtub",
    "bed",
    "blanket",
    "pillow",
    "shower",
    "surfboard",
]

[soft_constraints]
prefers_actions = [
    "cooking",
    "eating",
    "drinking",
]
prefers_props = [
    "frying_pan",
    "pot",
    "saucepan",
    "wok",
    "cutting_board",
    "knife",
    "chef_knife",
    "bread_knife",
    "spatula",
    "ladle",
    "wooden_spoon",
    "whisk",
    "tongs",
    "grater",
    "peeler",
    "can_opener",
    "bottle_opener",
    "measuring_cup",
    "measuring_spoons",
    "mixing_bowl",
    "colander",
    "strainer",
    "rolling_pin",
    "baking_sheet",
    "cake_pan",
    "muffin_tin",
    "oven_mitt",
    "pot_holder",
    "apron",
    "chef_apron",
    "kitchen_timer",
    "recipe_book",
    "food_processor",
    "blender",
    "stand_mixer",
    "toaster",
    "rice_cooker",
    "pressure_cooker",
    "steamer",
    "skillet",
    "dutch_oven",
]
