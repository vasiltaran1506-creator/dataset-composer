[meta]
id = "park"
category = "location"
display_name = "Park"
type = "outdoor_public"

[hard_constraints]
excludes_outfit_categories = [
    "02_clothing/underwear/",
    "02_clothing/full_body/pajamas.txt",
    "02_clothing/full_body/swimsuits.txt",
    "02_clothing/full_body/loungewear.txt"
]

excludes_actions = [
    "cooking", "sleeping", "showering", "brushing_teeth", 
    "taking_bath", "studying", "playing_instrument"
]

[soft_constraints]
prefers_actions = ["walking", "sitting_on_bench", "reading", "looking_at_trees", "feeding_birds", "picnic", "playing_with_pet", "jogging", "cycling", "taking_photos", "daydreaming"]

prefers_lighting_sources = ["sunlight", "dappled_sunlight", "golden_hour", "sunset", "sunrise", "overcast_light"]
prefers_lighting_quality = ["natural_lighting", "soft_lighting", "dappled_light", "warm_lighting"]

prefers_nature = ["tree", "cherry_blossom_tree", "maple_tree", "grass", "flower", "bush", "fallen_leaves", "pond", "bench", "path", "fountain"]
prefers_props = ["bench", "picnic_blanket", "basket", "book", "camera", "bicycle", "kite", "ball"]

[weather_rules.if_weather_is_rain]
requires_prop = "umbrella"

[visibility_modifiers]
reveals_features = ["face", "upper_body", "lower_body", "feet_footwear"]
conceals_if_sitting_on_bench = ["feet_footwear"]