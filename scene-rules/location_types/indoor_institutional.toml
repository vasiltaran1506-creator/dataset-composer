[meta]
id = "indoor_institutional"
display_name = "Indoor Institutional"

[hard_constraints]
excludes_outfit_categories = [
    "underwear",
    "full_body",
    "swimsuit",
    "topwear",
]
excludes_actions = [
    "sleeping",
    "eating",
    "cooking",
    "bathing",
    "playing instrument",
]
