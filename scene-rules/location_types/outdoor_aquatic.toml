[meta]
id = "outdoor_aquatic"
display_name = "Outdoor Aquatic"

[hard_constraints]
excludes_outfit_categories = [
    "bottomwear",
    "footwear",
    "full_body",
    "topwear",
]
excludes_weather = [
    "blizzard",
    "fog",
    "snow",
]
excludes_actions = [
    "cooking",
    "studying",
    "sleeping",
    "bathing",
]
excludes_props = [
    "frying_pan",
    "laptop",
]

[soft_constraints]
prefers_weather = [
    "sunny",
    "clear sky",
]
