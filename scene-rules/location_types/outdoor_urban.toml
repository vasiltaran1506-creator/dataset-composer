[meta]
id = "outdoor_urban"
display_name = "Outdoor Urban"

[hard_constraints]
excludes_outfit_categories = [
    "full_body",
    "swimsuit",
    "underwear",
]
excludes_actions = [
    "sleeping",
    "cooking",
    "bathing",
]
excludes_props = [
    "frying_pan",
    "bed",
]
excludes_lighting_sources = [
    "candlelight",
]

[soft_constraints]
prefers_weather = [
    "clear sky",
    "sunny",
    "cloudy",
    "overcast",
    "light rain",
]
avoid_weather = [
    "heavy rain",
    "storm",
    "blizzard",
    "dense fog",
]
