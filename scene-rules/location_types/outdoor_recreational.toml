[meta]
id = "outdoor_recreational"
display_name = "Outdoor Recreational"

[hard_constraints]
excludes_outfit_categories = [
    "full_body",
    "swimsuit",
    "underwear",
]
excludes_actions = [
    "cooking",
    "sleeping",
    "bathing",
]
excludes_props = [
    "frying_pan",
    "bed",
]

[soft_constraints]
prefers_weather = [
    "sunny",
    "clear sky",
    "cloudy",
    "partly cloudy",
]
avoid_weather = [
    "storm",
    "heavy rain",
    "blizzard",
]
