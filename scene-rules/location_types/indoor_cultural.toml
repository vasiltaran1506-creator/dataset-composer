[meta]
id = "indoor_cultural"
display_name = "Indoor Cultural / Quiet"

[hard_constraints]
excludes_outfit_categories = [
    "full_body",
    "swimsuit",
    "underwear",
]
excludes_actions = [
    "sleeping",
    "cooking",
    "eating",
    "bathing",
]
excludes_props = [
    "frying_pan",
    "laptop",
]
excludes_lighting_sources = [
    "bright sunlight",
    "moonlight",
    "neon_light",
    "stage lights",
    "starlight",
    "streetlight",
    "sunlight",
]
excludes_weather = [
    "rain",
    "snow",
    "fog",
    "storm",
    "sunny",
    "clear sky",
    "overcast",
    "cloudy",
]
