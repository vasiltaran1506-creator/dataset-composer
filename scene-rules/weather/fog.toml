[meta]
id = "fog"
category = "weather"
display_name = "Fog / Mist"

[hard_constraints]
# Туман несовместим с ярким солнечным светом
excludes_lighting_quality = [
    "hard_lighting",
    "bright_sunlight",
    "harsh_shadows"
]

[soft_constraints]
# Туманное освещение
prefers_lighting_quality = [
    "diffused_lighting",
    "soft_lighting",
    "hazy_lighting",
    "ethereal_lighting"
]

# Атмосферные эффекты (теперь у нас есть effects.txt!)
prefers_effects = [
    "fog",
    "mist",
    "dense_fog",
    "light_fog",
    "morning_mist",
    "haze"
]

# Типичные локации для тумана
prefers_locations = [
    "forest",
    "street",
    "lake",
    "bridge",
    "mountain",
    "park"
]

[visibility_modifiers]
reduces_visibility = ["background_details", "distant_objects", "sky"]
adds_effects = ["depth_haze", "soft_edges"]