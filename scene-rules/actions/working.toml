[meta]
id = "working"
display_name = "Working"

[hard_constraints]
allowed_locations = [
    "office",
    "cafe",
    "library",
    "bedroom",
    "classroom",
]
excludes_locations = [
    "bathroom",
    "kitchen",
    "beach",
    "gym",
    "street",
    "park",
]

[soft_constraints]
prefers_locations = [
    "office",
    "cafe",
    "library",
]
prefers_poses = [
    "sitting",
    "sitting_at_desk",
]
prefers_props = [
    "laptop",
    "desktop computer",
    "notebook",
    "coffee cup",
]
prefers_expressions = [
    "focused",
    "thoughtful",
    "determined",
]
