[meta]
id = "studying"
display_name = "Studying"

[hard_constraints]
allowed_locations = [
    "library",
    "cafe",
    "classroom",
    "bedroom",
    "office",
]
excludes_locations = [
    "kitchen",
    "bathroom",
    "beach",
    "gym",
    "street",
    "park",
]

[soft_constraints]
prefers_locations = [
    "library",
    "cafe",
    "classroom",
]
prefers_poses = [
    "sitting",
    "sitting_at_desk",
    "leaning forward",
    "hunched_over",
]
prefers_props = [
    "pen",
    "pencil",
    "mechanical_pencil",
    "fountain_pen",
    "ballpoint_pen",
    "gel_pen",
    "marker",
    "highlighter",
    "book",
    "novel",
    "manga",
    "magazine",
]
prefers_expressions = [
    "focused",
    "thoughtful",
    "determined",
]
excludes_actions = [
    "bathing",
    "cooking",
    "dancing",
    "eating",
    "exercising",
]
