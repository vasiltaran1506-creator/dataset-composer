[meta]
id = "playing_music"
display_name = "Playing Music"

[hard_constraints]
allowed_locations = [
    "bedroom",
    "street",
    "park",
    "cafe",
    "balcony",
    "concert hall",
    "recording studio",
]
excludes_locations = [
    "bathroom",
    "kitchen",
    "library",
    "gym",
    "classroom",
]

[soft_constraints]
prefers_locations = [
    "bedroom",
    "street",
    "park",
]
prefers_poses = [
    "sitting",
    "standing",
]
prefers_props = [
    "microphone",
]
prefers_expressions = [
    "focused",
    "peaceful",
    "relaxed",
    "smile",
]
