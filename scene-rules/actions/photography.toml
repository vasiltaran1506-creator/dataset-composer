[meta]
id = "photography"
display_name = "Photography"

[hard_constraints]
allowed_locations = [
    "street",
    "park",
    "beach",
    "mountain",
    "forest",
    "rooftop",
    "balcony",
]
excludes_locations = [
    "bathroom",
    "kitchen",
    "bedroom",
    "library",
    "gym",
    "classroom",
]

[soft_constraints]
prefers_locations = [
    "street",
    "park",
    "beach",
]
prefers_poses = [
    "standing",
]
prefers_props = [
    "camera",
    "dslr",
    "tripod",
]
prefers_expressions = [
    "focused",
    "determined",
]
