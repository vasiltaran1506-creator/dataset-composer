[meta]
id = "taking_bath"
category = "action"
display_name = "Taking a Bath"

[hard_constraints]
preferred_locations = ["bathroom"]
excludes_outfit_categories = ["02_clothing/topwear/", "02_clothing/bottomwear/", "02_clothing/full_body/dresses.txt", "02_clothing/full_body/uniforms.txt", "02_clothing/footwear/"]
optional_outfit_categories = ["02_clothing/full_body/swimsuits.txt"]
excludes_props = ["smartphone", "laptop", "book", "steering_wheel"]

[soft_constraints]
prefers_poses = ["sitting_in_tub", "reclining_in_tub", "knees_to_chest", "legs_crossed_in_water", "lying_in_tub", "arms_on_tub_edge", "leaning_back"]
prefers_expressions = ["relaxed", "eyes_closed", "gentle_smile", "peaceful", "content", "dreamy", "blush"]
prefers_effects = ["bubbles", "steam", "wet_skin", "water_droplets", "wet_hair"]
prefers_props = ["bathtub", "bath_bomb", "rubber_duck", "soap", "bath_towel", "candlelight", "wine_glass", "bath_salts", "loofah"]
prefers_lighting_sources = ["candlelight", "warm_lamp", "window_light", "dim_light"]
prefers_lighting_quality = ["soft_lighting", "warm_lighting", "moody_lighting", "low-key_lighting"]

[visibility_modifiers]
conceals_if_bubbles = ["upper_body", "lower_body", "breasts"]
conceals_if_steam = ["background", "lower_body"]
reveals_if_arms_on_tub_edge = ["shoulders", "collarbone", "upper_chest", "face"]
reveals_if_reclining = ["legs", "upper_body", "face"]
reveals_features = ["face", "hair", "wet_hair"]

[run_config_options]
visibility_modes = ["modest", "suggestive", "artistic_nude", "swimsuit"]