[meta]
id = "writing"
display_name = "Writing"

[hard_constraints]
allowed_locations = [
    "library",
    "cafe",
    "bedroom",
    "classroom",
    "office",
    "balcony",
]
excludes_locations = [
    "kitchen",
    "bathroom",
    "beach",
    "gym",
    "street",
    "park",
]

[soft_constraints]
prefers_locations = [
    "library",
    "cafe",
    "bedroom",
]
prefers_poses = [
    "sitting",
    "sitting_at_desk",
    "leaning forward",
]
prefers_props = [
    "pen",
    "pencil",
    "fountain_pen",
    "notebook",
    "diary",
]
prefers_expressions = [
    "focused",
    "thoughtful",
    "determined",
]
