[meta]
id = "cooking"
category = "action"
display_name = "Cooking / Preparing Food"

[hard_constraints]
preferred_locations = ["kitchen"]

requires_prop_categories = [
    "09_props/kitchen_tools.txt",
    "09_props/food_drink.txt"
]

excludes_actions = [
    "sleeping", "reading", "studying", "swimming", "taking_bath", "exercising"
]

[soft_constraints]
prefers_poses = ["standing", "leaning_on_counter", "leaning_forward"]
prefers_expressions = ["focused", "concentrated", "gentle_smile", "content"]

prefers_lighting_sources = ["overhead_light", "window_light", "fluorescent_light"]
prefers_lighting_quality = ["bright_lighting", "natural_lighting"]

[visibility_modifiers]
reveals_features = ["hands", "upper_body", "face"]
conceals_if_behind_counter = ["lower_body", "feet_footwear"]