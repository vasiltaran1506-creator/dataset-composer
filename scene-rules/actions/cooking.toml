[meta]
id = "cooking"
display_name = "Cooking"

[hard_constraints]
allowed_locations = [
    "kitchen",
]
excludes_locations = [
    "bedroom",
    "bathroom",
    "library",
    "cafe",
    "beach",
    "gym",
    "street",
    "park",
]

[soft_constraints]
prefers_locations = [
    "kitchen",
]
prefers_poses = [
    "standing",
    "bending forward",
    "reaching forward",
]
prefers_props = [
    "frying_pan",
    "pot",
    "saucepan",
    "wok",
    "cutting_board",
    "knife",
    "chef_knife",
    "bread_knife",
    "spatula",
    "ladle",
]
prefers_expressions = [
    "focused",
    "smile",
    "determined",
    "happy",
]
