[meta]
id = "reading"
category = "action"
display_name = "Reading"

[hard_constraints]
requires_prop_categories = [
    "09_props/books.txt",
    "09_props/electronics.txt"
]

excludes_actions = [
    "running", "swimming", "jumping", "exercising", "dancing", "cooking"
]

[soft_constraints]
prefers_poses = ["sitting", "sitting_on_chair", "sitting_on_floor", "sitting_cross_legged", "lying_on_stomach", "lying_on_side", "leaning_back", "standing"]
prefers_expressions = ["focused", "concentrated", "thoughtful", "gentle_smile", "downcast_eyes", "looking_down"]
prefers_locations = ["bedroom", "library", "cafe", "park", "balcony", "living_room", "train_interior"]

prefers_lighting_sources = ["desk_lamp", "window_light", "lamplight", "overhead_light", "sunlight"]
prefers_lighting_quality = ["warm_lighting", "soft_lighting", "bright_lighting"]

[visibility_modifiers]
reveals_features = ["hands", "face", "upper_body"]
conceals_if_sitting = ["lower_body", "feet_footwear"]