[meta]
id = "playing_instrument"
category = "action"
display_name = "Playing Musical Instrument"

[hard_constraints]
excludes_actions = [
    "reading",
    "cooking",
    "eating",
    "taking_bath",
]
excludes_props = [
    "steering_wheel",
    "frying_pan",
    "book",
]

[soft_constraints]
prefers_poses = [
    "sitting",
    "sitting_on_stool",
    "standing",
    "leaning_forward",
]
prefers_expressions = [
    "focused",
    "eyes_closed",
    "gentle_smile",
    "concentrated",
    "peaceful",
    "passionate",
]
prefers_locations = [
    "bedroom",
    "street",
    "park",
]
prefers_props = [
    "guitar",
    "acoustic_guitar",
    "electric_guitar",
    "piano",
    "grand_piano",
    "violin",
    "cello",
    "flute",
    "trumpet",
    "drum_sticks",
    "keyboard_instrument",
    "synthesizer",
]
prefers_lighting_sources = [
    "spotlight",
    "stage_lights",
    "window_light",
    "warm_lamp",
    "candlelight",
]
prefers_lighting_quality = [
    "cinematic_lighting",
    "dramatic_lighting",
    "warm_lighting",
    "spotlight",
]

[visibility_modifiers]
reveals_features = [
    "hands",
    "arms",
    "face",
    "upper_body",
]
conceals_if_playing_piano = [
    "lower_body",
    "feet_footwear",
]
