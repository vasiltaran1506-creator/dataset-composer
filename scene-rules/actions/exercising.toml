[meta]
id = "exercising"
category = "action"
display_name = "Exercising / Workout"

[hard_constraints]
# Требуется спортивная одежда
requires_outfit_categories = [
    "02_clothing/topwear/sportswear.txt",
    "02_clothing/bottomwear/sportswear.txt",
    "02_clothing/full_body/sportswear.txt"
]
excludes_outfit_categories = [
    "02_clothing/full_body/dresses.txt",
    "02_clothing/full_body/uniforms.txt",
    "02_clothing/footwear/boots.txt"
]
excludes_locations = ["library", "cafe", "school_classroom"]

[soft_constraints]
# Спортивные позы
prefers_poses = [
    "stretching",
    "yoga_pose",
    "running_pose",
    "jumping",
    "squatting",
    "plank_position"
]

# Выражения лица при нагрузке
prefers_expressions = [
    "focused",
    "determined",
    "sweating",
    "heavy_breathing",
    "concentrated"
]

# Локации для спорта
prefers_locations = [
    "gym",
    "park",
    "sports_field",
    "beach",
    "home_gym"
]

# Спортивный инвентарь
prefers_props = [
    "yoga_mat",
    "dumbbells",
    "water_bottle",
    "towel",
    "fitness_ball",
    "jump_rope"
]

[visibility_modifiers]
# При спорте видны все части тела
reveals_features = ["full_body", "legs", "arms", "midriff"]