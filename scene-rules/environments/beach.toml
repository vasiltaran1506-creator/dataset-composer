[meta]
id = "beach"
category = "environment"
display_name = "Beach"

[hard_constraints]
# 🛑 EXCLUDES: Полные запреты (Validator убьет сцену при их наличии)
excludes_outfits = ["winter_coat", "office_uniform"]
excludes_props = ["office_chair", "desk_lamp"]
excludes_weathers = ["snow", "heavy_rain"]

[soft_constraints]
# ⚖️ PREFERS: То, что естественно для этой локации (повышает вес при выборе)
prefers_actions = [
    "walking_shore", 
    "collecting_shells", 
    "sunbathing",
    "looking_at_sea"
]

prefers_outfits = [
    "swimsuit", 
    "summer_dress", 
    "shorts_and_tshirt"
]

# 🌊 INFLUENCES: Задает вектор для других компонентов
influences_lighting = ["natural_sunlight", "golden_hour", "bright_daylight"]
influences_mood = ["relaxed", "joyful", "melancholic"]

[visibility_modifiers]
# 👁️ CONCEALS: Что эта локация может скрывать
# (Например, если персонаж зашел в воду, ноги не видны)
conceals_features = ["feet_footwear"] 
