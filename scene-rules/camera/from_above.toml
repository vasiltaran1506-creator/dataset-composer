[meta]
id = "from_above"
category = "camera"
display_name = "High Angle / Bird's Eye View"

[hard_constraints]
camera_angle = "high_angle"
excludes_framing = [
    "extreme_close_up",
    "face_shot",
]

[soft_constraints]
prefers_poses = [
    "sitting on floor",
    "lying on back",
    "lying on side",
    "sitting_cross_legged",
    "curled_up",
]
prefers_actions = [
    "reading",
    "sleeping",
]
prefers_lighting_sources = [
    "overhead_light",
    "sunlight",
    "lamplight",
]

[coverage_impact]
face_weight = 0.5
upper_body_weight = 0.8
lower_body_weight = 0.6
feet_weight = 0.3
