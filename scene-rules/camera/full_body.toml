[meta]
id = "full_body"
category = "camera"
display_name = "Full Body Shot"

[hard_constraints]
# Полный рост должен показывать всё тело
reveals_features = [
    "face",
    "upper_body",
    "lower_body",
    "feet_footwear",
    "full_outfit"
]
excludes_poses = [
    "close_up_pose",
    "headshot_only"
]

[soft_constraints]
# Позы, подходящие для полного роста
prefers_poses = [
    "standing",
    "walking",
    "full_body_stretch",
    "jumping",
    "dancing"
]

# Освещение для полного роста
prefers_lighting_quality = [
    "natural_lighting",
    "even_lighting",
    "cinematic_lighting"
]

# Локации с пространством
prefers_locations = [
    "park",
    "street",
    "beach",
    "field",
    "large_room"
]

[coverage_impact]
# Полный рост дает максимальное покрытие всех частей тела
face_weight = 1.0
upper_body_weight = 1.0
lower_body_weight = 1.0
feet_weight = 1.0
full_outfit_weight = 1.0