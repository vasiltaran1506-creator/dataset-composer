[meta]
id = "pov"
category = "camera"
display_name = "POV / Point of View"

[hard_constraints]
camera_angle = "pov"
camera_mode = "first_person"

[soft_constraints]
prefers_actions = []
prefers_poses = [
    "leaning_forward",
    "sitting_across",
    "standing_close",
    "reaching_out",
    "hand_on_viewer",
]
prefers_expressions = [
    "looking_at_viewer",
    "smile",
    "gentle_smile",
    "blush",
    "shy",
    "excited",
    "winking",
]
prefers_framing = [
    "close_up",
    "upper_body",
    "cowboy_shot",
]
prefers_interaction_props = [
    "coffee_cup",
    "food",
    "gift",
    "book",
    "hand",
]

[visibility_modifiers]
reveals_features = [
    "face",
    "hands",
    "upper_body",
]
conceals_features = [
    "feet_footwear",
    "lower_body",
]

[coverage_impact]
face_weight = 1.0
hands_weight = 1.0
upper_body_weight = 0.8
lower_body_weight = 0.2
feet_weight = 0.0
