[meta]
id = "from_below"
category = "camera"
display_name = "Low Angle / From Below"

[hard_constraints]
camera_angle = "low_angle"
excludes_angles = [
    "from_above",
    "bird_eye_view",
]

[soft_constraints]
prefers_poses = [
    "standing",
    "looking_down_at_viewer",
    "hand on hip",
    "arms crossed",
    "walking",
    "looking over shoulder",
]
prefers_expressions = [
    "looking down",
    "confident",
    "smirk",
    "gentle smile",
    "surprised",
    "serious",
]
prefers_angles = [
    "from_below",
    "low_angle",
    "worm_eye_view",
]
prefers_outfit_focus = [
    "shoes",
    "boots",
    "legwear",
    "skirt_hem",
    "pants_cuff",
]
prefers_lighting_sources = [
    "sunlight",
    "blue_sky",
    "overhead_light",
]

[coverage_impact]
face_weight = 0.8
upper_body_weight = 0.7
lower_body_weight = 1.0
feet_weight = 1.0
shoes_focus_weight = 1.0
