[meta]
id = "cowboy_shot"
category = "camera"
display_name = "Cowboy Shot (Knee-up)"

[hard_constraints]
reveals_features = [
    "face",
    "upper_body",
    "mid_body",
    "thighs",
]
conceals_features = [
    "lower_legs",
    "feet_footwear",
]

[soft_constraints]
prefers_poses = [
    "standing",
    "hand on hip",
    "arms crossed",
    "leaning",
    "casual_stance",
]
prefers_lighting_quality = [
    "cinematic_lighting",
    "dramatic_lighting",
    "rim_light",
]

[coverage_impact]
face_weight = 1.0
upper_body_weight = 1.0
mid_body_weight = 1.0
lower_body_weight = 0.5
feet_weight = 0.0
